<div class="home">
    <app-resumen-totales [ingresos]="totalIngresos" [gastos]="totalGastos"></app-resumen-totales>

    <h2 class="home__subtitle">Transacciones Recientes</h2>

    @if (error) {
        <div class="home__error">{{ error }}</div>
    }

    <div class="home__lista">
        @for (t of transaccionesRecientes; track t.id) {
            <app-tarjeta-gasto
                [id]="t.id!"
                [tipo]="t.tipo"
                [monto]="t.monto"
                [descripcion]="t.descripcion"
                [categoria]="t.categoria?.nombre || ''"
                [fecha]="t.fecha">
            </app-tarjeta-gasto>
        }
    </div>
</div>
