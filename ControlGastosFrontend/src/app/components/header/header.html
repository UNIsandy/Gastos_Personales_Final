<header class="header">
    <button class="header__menu-btn" (click)="sidebar.toggle()" aria-label="Menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="header__brand">
        <img class="header__logo" src="finza-logo.png" alt="Finza">
    </div>
    <div class="header__user">
        <span class="header__user-name">{{ nombre }}</span>
        <span class="header__user-avatar">{{ inicial }}</span>
    </div>
</header>
