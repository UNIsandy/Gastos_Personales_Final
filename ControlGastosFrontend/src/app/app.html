@if (router.url !== '/login' && router.url !== '/registro') {
    <div class="app-layout">
        <app-header></app-header>
        <div class="app-body">
            <app-sidebar></app-sidebar>
            <main class="app-content">
                <router-outlet></router-outlet>
            </main>
        </div>
        <app-footer></app-footer>

} @else {

}
